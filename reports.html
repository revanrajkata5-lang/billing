<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Analytics — Revanraj Restaurant Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="shell">
    <div class="sidebar">
      <div class="brand">
        <div class="brand-mark">Revan<span>raj</span></div>
        <div class="brand-role" id="user-role-label">Super Admin</div>
      </div>

      <div class="nav-group">
        <div class="nav-label">Overview</div>
        <a class="nav-item" data-page="dashboard.html" data-roles="admin" href="dashboard.html"><span class="nav-icon">◆</span> Dashboard</a>
        <a class="nav-item" data-page="franchise.html" data-roles="admin" href="franchise.html"><span class="nav-icon">⌂</span> Franchise</a>
        <a class="nav-item" data-page="reports.html" data-roles="admin" href="reports.html"><span class="nav-icon">▤</span> Analytics</a>
      </div>
      <div class="nav-group">
        <div class="nav-label">Front of House</div>
        <a class="nav-item" data-page="tables.html" data-roles="admin,waiter,cashier" href="tables.html"><span class="nav-icon">▦</span> Tables</a>
        <a class="nav-item" data-page="waiter.html" data-roles="admin,waiter" href="waiter.html"><span class="nav-icon">✎</span> Waiter Order</a>
        <a class="nav-item" data-page="kds.html" data-roles="admin,kitchen" href="kds.html"><span class="nav-icon">▲</span> Kitchen Display</a>
        <a class="nav-item" data-page="pos.html" data-roles="admin,cashier" href="pos.html"><span class="nav-icon">$</span> Billing / POS</a>
      </div>
      <div class="nav-group">
        <div class="nav-label">Back of House</div>
        <a class="nav-item" data-page="menu.html" data-roles="admin" href="menu.html"><span class="nav-icon">☰</span> Menu Management</a>
        <a class="nav-item" data-page="inventory.html" data-roles="admin" href="inventory.html"><span class="nav-icon">▣</span> Inventory</a>
        <a class="nav-item" data-page="employees.html" data-roles="admin" href="employees.html"><span class="nav-icon">●</span> Employees</a>
      </div>

      <div class="sidebar-foot">
        <div style="font-family:var(--font-mono); font-size:10.5px; color:var(--cream-dim);">Logged in as</div>
        <div style="font-size:13px; font-weight:600; margin-top:2px;" id="user-name-label">revanraj</div>
        <button class="logout-btn" id="logout-btn">Log Out</button>
      </div>
    </div>

    <div class="main">
      <div class="view">
        <div class="page-head">
          <div>
            <div class="page-eyebrow">Analytics</div>
            <div class="page-title">Performance Dashboard</div>
          </div>
        </div>
        <div class="two-col">
          <div class="panel">
            <div class="panel-title">Weekly Sales <small>All Branches, &#8377;</small></div>
            <div class="bar-chart" id="weekly-chart"></div>
          </div>
          <div class="panel">
            <div class="panel-title">Menu Items <small>by price</small></div>
            <div id="top-items" style="display:flex; flex-direction:column; gap:10px;"></div>
          </div>
        </div>
        <div class="stat-row" id="report-stats"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="modal-bg" id="modal-bg"><div class="modal" id="modal-content"></div></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>
  <script>
    checkAuth(['admin']);
    let state = loadState();

    function render(){
      const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      document.getElementById('weekly-chart').innerHTML = days.map(d=>`
        <div class="bar-wrap">
          <div class="bar" style="height:2%;"></div>
          <div class="bar-lbl">${d}</div>
        </div>
      `).join('') + '<div class="empty-state" style="width:100%; margin-top:10px;">No sales history yet — this chart will fill in as bills are collected.</div>';
      const top = [...state.menu].sort((a,b)=>b.price-a.price).slice(0,5);
      document.getElementById('top-items').innerHTML = top.length ? top.map((m,i)=>`
        <div style="display:flex; justify-content:space-between; font-size:13px; padding:8px 0; border-bottom:1px dashed var(--edge);">
          <span>${i+1}. ${m.name}</span><span style="font-family:var(--font-mono); color:var(--copper);">${fmt(m.price)}</span>
        </div>
      `).join('') : '<div class="empty-state">Add menu items to see them ranked here.</div>';
      document.getElementById('report-stats').innerHTML = `
        <div class="stat-card"><div class="num">—</div><div class="lbl">Average Bill Value</div></div>
        <div class="stat-card"><div class="num">—</div><div class="lbl">Cancelled Orders</div></div>
        <div class="stat-card"><div class="num">—</div><div class="lbl">Refunds Today</div></div>
        <div class="stat-card"><div class="num">—</div><div class="lbl">Peak Hours</div></div>
      `;
    }
    render();
    document.addEventListener('state-updated', render);

  </script>
</body>
</html>
