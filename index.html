<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign In — Revanraj Restaurant Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="login-screen">
    <div class="ticket-strip"></div>
    <div class="login-card">
      <div class="login-eyebrow">Revanraj Restaurant Platform</div>
      <div class="login-title">Sign in</div>
      <div class="login-sub">Use your staff login to continue.</div>

      <form id="login-form">
        <div class="field">
          <label for="login-user">Username</label>
          <input type="text" id="login-user" autocomplete="username" autofocus>
        </div>
        <div class="field">
          <label for="login-pass">Password</label>
          <input type="password" id="login-pass" autocomplete="current-password">
        </div>
        <button type="submit" class="login-btn">Sign In</button>
        <div class="login-error" id="login-error">Incorrect username or password.</div>
      </form>

      <div class="login-foot">Admin · Waiter · Cashier · Kitchen Staff</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>
  <script>
    // Already logged in? Skip straight to your home page.
    (function(){
      if(localStorage.getItem('revanraj_auth') === '1'){
        const role = currentRole();
        if(role && ROLES[role]){ window.location.href = ROLES[role].home; }
      }
    })();

    document.getElementById('login-form').addEventListener('submit', (e)=>{
      e.preventDefault();
      const user = document.getElementById('login-user').value.trim();
      const pass = document.getElementById('login-pass').value;
      const role = doLogin(user, pass);
      const errEl = document.getElementById('login-error');
      if(role){
        errEl.style.display = 'none';
        window.location.href = ROLES[role].home;
      } else {
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
